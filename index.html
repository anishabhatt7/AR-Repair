<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <meta name="google" content="notranslate">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; connect-src https://api.anthropic.com https://generativelanguage.googleapis.com; img-src 'self' blob: data:; style-src 'self' 'unsafe-inline'">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>AR Repair</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Chat Screen (entry point) -->
  <section id="screen-chat" class="screen active">
    <div class="chat-window">
      <header class="chat-header">
        <div class="chat-header-left">
          <div class="chat-avatar-header" id="chat-avatar-header">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7v1h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1v-1a7 7 0 0 1 7-7h1V5.73A2 2 0 0 1 12 2zm-2 12a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zm4 0a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z" fill="white"/>
            </svg>
          </div>
          <span class="chat-title">AI Agent</span>
        </div>
        <div class="chat-header-right">
          <button class="chat-icon-btn" id="btn-chat-settings" aria-label="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2e2e2e" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
            </svg>
          </button>
          <button class="chat-icon-btn" id="btn-chat-minimize" aria-label="Minimize">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2e2e2e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
        </div>
      </header>
      <div class="chat-body" id="chat-body">
        <!-- messages rendered here by chat.js -->
      </div>
      <div class="chat-footer">
        <div class="chat-composer" id="chat-composer">
          <button class="chat-composer-icon" id="btn-attach" aria-label="Attach">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5c5c5c" stroke-width="2" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
          <input type="text" id="chat-input" placeholder="What can I help you with?" autocomplete="off">
          <button class="chat-composer-icon" id="btn-send" aria-label="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5c5c5c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- Settings Screen -->
  <section id="screen-settings" class="screen">
    <div class="setup-content">
      <header class="settings-header">
        <button id="btn-back-settings" class="btn-back">&larr;</button>
        <h2>Settings</h2>
      </header>

      <div class="form-group">
        <label for="provider-select">AI Provider</label>
        <select id="provider-select">
          <option value="gemini">Google Gemini</option>
          <option value="anthropic">Anthropic Claude</option>
        </select>
      </div>

      <div class="form-group">
        <label for="api-key-input" id="api-key-label">Google API Key</label>
        <input type="password" id="api-key-input" placeholder="AIza...">
        <p class="hint" id="api-key-hint">Stored locally on your device only.</p>
      </div>

      <button id="btn-save-key" class="btn-start">Save Key</button>

      <div class="info-box" id="info-gemini">
        <p>Get a free key at <strong>aistudio.google.com</strong> &rarr; Get API Key</p>
      </div>
      <div class="info-box hidden" id="info-anthropic">
        <p>Get a key at <strong>console.anthropic.com</strong> &rarr; API Keys</p>
      </div>
    </div>
  </section>

  <!-- AR Screen (main experience) -->
  <section id="screen-ar" class="screen">
    <!-- Full-screen camera -->
    <video id="camera-feed" autoplay playsinline muted></video>
    <canvas id="ar-overlay"></canvas>

    <!-- Top bar: back + progress -->
    <div id="ar-top-bar" class="ar-top-bar hidden">
      <button id="btn-ar-back" class="ar-top-btn" aria-label="Back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="ar-progress-bar">
        <div class="ar-progress-fill" id="ar-progress-fill"></div>
      </div>
      <button id="btn-menu" class="ar-top-btn" aria-label="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
        </svg>
      </button>
    </div>

    <!-- Step card (bottom sheet) -->
    <div id="step-card" class="step-card hidden">
      <div class="step-card-header">
        <span class="step-card-badge" id="step-badge">STEP 1</span>
        <span class="step-card-meta" id="step-meta"></span>
      </div>
      <p class="step-card-instruction" id="step-card-text"></p>
      <div class="step-card-nav">
        <button id="btn-prev" class="step-nav-btn step-nav-prev" aria-label="Previous" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          <span>Back</span>
        </button>
        <button id="btn-rescan" class="step-nav-btn step-nav-rescan" aria-label="Rescan">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          <span>Rescan</span>
        </button>
        <button id="btn-next" class="step-nav-btn step-nav-next" aria-label="Next">
          <span>Next</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>

    <!-- HUD: status/loading indicator -->
    <div id="ar-status" class="ar-status hidden">
      <div class="scan-pulse"></div>
      <p id="ar-status-text">Analyzing device...</p>
    </div>

    <!-- Menu panel (slide out) -->
    <div id="menu-panel" class="menu-panel hidden">
      <button id="btn-close-menu" class="btn-back">&times;</button>
      <nav>
        <button id="menu-new-repair" class="menu-item">New Repair</button>
        <button id="menu-settings" class="menu-item">Settings</button>
      </nav>
    </div>
  </section>

  <!-- Offline Banner -->
  <div id="offline-banner" class="offline-banner hidden">
    No internet — scanning requires connection
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
