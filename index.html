<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; connect-src https://api.anthropic.com https://generativelanguage.googleapis.com; img-src 'self' blob: data:; style-src 'self' 'unsafe-inline'">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>AR Repair</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Setup Screen -->
  <section id="screen-setup" class="screen active">
    <div class="setup-content">
      <h1 class="setup-title">AR Repair</h1>
      <p class="setup-subtitle">Point your camera. Get visual repair guides.</p>

      <div class="setup-form">
        <div class="form-group">
          <label for="product-category">What device?</label>
          <select id="product-category">
            <option value="">Select type...</option>
            <option value="printer">Printer</option>
            <option value="router">Router / Modem</option>
            <option value="appliance">Home Appliance</option>
            <option value="laptop">Laptop / Computer</option>
            <option value="phone">Phone / Tablet</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="product-model">Brand &amp; Model</label>
          <input type="text" id="product-model" placeholder="e.g. HP DeskJet 2700">
        </div>

        <div class="form-group">
          <label for="problem-description">What's wrong?</label>
          <textarea id="problem-description" rows="2" placeholder="Describe the problem..."></textarea>
        </div>

        <label class="demo-toggle-label">
          <input type="checkbox" id="demo-toggle" checked>
          <span>Demo Mode (no API key needed)</span>
        </label>

        <button id="btn-start" class="btn-start" disabled>Start AR Repair</button>
      </div>

      <button id="btn-settings" class="btn-settings">Settings</button>
    </div>
  </section>

  <!-- Settings Screen -->
  <section id="screen-settings" class="screen">
    <div class="setup-content">
      <header class="settings-header">
        <button id="btn-back-settings" class="btn-back">&larr;</button>
        <h2>Settings</h2>
      </header>

      <div class="form-group">
        <label for="provider-select">AI Provider</label>
        <select id="provider-select">
          <option value="gemini">Google Gemini</option>
          <option value="anthropic">Anthropic Claude</option>
        </select>
      </div>

      <div class="form-group">
        <label for="api-key-input" id="api-key-label">Google API Key</label>
        <input type="password" id="api-key-input" placeholder="AIza...">
        <p class="hint" id="api-key-hint">Stored locally on your device only.</p>
      </div>

      <button id="btn-save-key" class="btn-start">Save Key</button>

      <div class="info-box" id="info-gemini">
        <p>Get a free key at <strong>aistudio.google.com</strong> &rarr; Get API Key</p>
      </div>
      <div class="info-box hidden" id="info-anthropic">
        <p>Get a key at <strong>console.anthropic.com</strong> &rarr; API Keys</p>
      </div>
    </div>
  </section>

  <!-- AR Screen (main experience) -->
  <section id="screen-ar" class="screen">
    <!-- Full-screen camera -->
    <video id="camera-feed" autoplay playsinline muted></video>
    <canvas id="ar-overlay"></canvas>

    <!-- HUD: hamburger menu -->
    <button id="btn-menu" class="hud-btn hud-top-left" aria-label="Menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <!-- HUD: step counter -->
    <div id="step-counter" class="step-counter hidden">
      <svg width="56" height="56" viewBox="0 0 56 56">
        <circle cx="28" cy="28" r="24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
        <circle cx="28" cy="28" r="24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="3" id="step-progress" stroke-dasharray="150.8" stroke-dashoffset="0" stroke-linecap="round"/>
      </svg>
      <span id="step-number">1</span>
    </div>

    <!-- HUD: instruction text -->
    <div id="instruction-bar" class="instruction-bar hidden">
      <p id="instruction-text"></p>
    </div>

    <!-- HUD: status/loading indicator -->
    <div id="ar-status" class="ar-status hidden">
      <div class="scan-pulse"></div>
      <p id="ar-status-text">Scanning...</p>
    </div>

    <!-- HUD: controls at bottom -->
    <div id="ar-controls" class="ar-controls hidden">
      <button id="btn-prev" class="ar-nav-btn" aria-label="Previous step">&larr;</button>
      <button id="btn-rescan" class="ar-scan-btn" aria-label="Rescan">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
        </svg>
      </button>
      <button id="btn-next" class="ar-nav-btn" aria-label="Next step">&rarr;</button>
    </div>

    <!-- Menu panel (slide out) -->
    <div id="menu-panel" class="menu-panel hidden">
      <button id="btn-close-menu" class="btn-back">&times;</button>
      <nav>
        <button id="menu-new-repair" class="menu-item">New Repair</button>
        <button id="menu-settings" class="menu-item">Settings</button>
      </nav>
    </div>
  </section>

  <!-- Offline Banner -->
  <div id="offline-banner" class="offline-banner hidden">
    No internet — scanning requires connection
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
